spring:
  kafka:
    bootstrap-servers: localhost:9092
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

websocket:
  allowed-origins: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
